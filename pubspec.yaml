name: weatherman
description: "WeatherMan - A premium glassmorphic weather app"
publish_to: 'none'
version: 1.0.9+9

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  http: ^1.2.2
  
  # Location Services
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  permission_handler: ^12.0.1
  
  # Local Storage
  shared_preferences: ^2.3.3
  
  # URL Launcher
  url_launcher: ^6.3.1
  
  # UI Enhancements
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Utils
  intl: ^0.20.2
  fluttertoast: ^9.0.0

  # Background sync + notifications
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0

  # Home screen widgets
  home_widget: ^0.9.0

  # Platform intents (battery optimization prompt)
  android_intent_plus: ^6.0.0

  # Firebase push
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
